name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.mod

      - name: Run gofmt check
        shell: pwsh
        run: |
          $files = git ls-files '*.go'
          $diff = gofmt -l $files
          if ($diff) {
            Write-Error "The following files are not formatted:`n$diff"
          }

      - name: Run tests
        run: go test ./...

      - name: Run benchmark smoke
        run: go test ./internal/predict -run ^$ -bench BenchmarkPredict -benchtime=1x

      - name: Build binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $binaryName = if ($IsWindows) { "cliai.exe" } else { "cliai" }
          $binaryPath = Join-Path "dist" $binaryName
          $buildDate = Get-Date -Format s
          go build -trimpath -ldflags "-X github.com/sanqiu/cliai/internal/app.Version=ci -X github.com/sanqiu/cliai/internal/app.Commit=${env:GITHUB_SHA} -X github.com/sanqiu/cliai/internal/app.BuildDate=$buildDate" -o $binaryPath .

      - name: Run selftest
        shell: pwsh
        run: |
          $binaryName = if ($IsWindows) { "cliai.exe" } else { "cliai" }
          & (Join-Path (Resolve-Path "dist") $binaryName) selftest --json
